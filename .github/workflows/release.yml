name: Release

on:
  push:
    tags:
      - 'v*'

permissions:
  contents: write

jobs:
  release:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v5
        with:
          fetch-depth: 0

      - name: Extract version from tag
        id: version
        run: |
          VERSION="${GITHUB_REF_NAME#v}"
          echo "version=$VERSION" >> $GITHUB_OUTPUT
          echo "Releasing v$VERSION"

      - name: Verify source version matches tag
        run: |
          VERSION="${{ steps.version.outputs.version }}"
          SOURCE_VERSION=$(grep -oP '#define TODOC_VERSION "\K[^"]+' src/cli.h)
          FILE_VERSION=$(cat .version | tr -d '[:space:]')

          if [ "$SOURCE_VERSION" != "$VERSION" ]; then
            echo "::error::src/cli.h has TODOC_VERSION=\"$SOURCE_VERSION\" but tag is v$VERSION. Run scripts/release.sh first."
            exit 1
          fi
          if [ "$FILE_VERSION" != "$VERSION" ]; then
            echo "::error::.version has \"$FILE_VERSION\" but tag is v$VERSION. Run scripts/release.sh first."
            exit 1
          fi
          echo "Source version verified: v$VERSION"

      - name: Install dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y libsqlite3-dev
          pip install git-cliff

      - name: Build release binary
        run: |
          make clean
          make
          cp build/todoc todoc-linux-x86_64
          chmod +x todoc-linux-x86_64

      - name: Verify binary version
        run: |
          VERSION="${{ steps.version.outputs.version }}"
          BINARY_VERSION=$(./todoc-linux-x86_64 version 2>&1 | grep -oE '[0-9]+\.[0-9]+\.[0-9]+')
          if [ "$BINARY_VERSION" != "$VERSION" ]; then
            echo "::error::Binary reports v$BINARY_VERSION but expected v$VERSION"
            exit 1
          fi
          echo "Binary version verified: v$VERSION"

      - name: Run tests
        run: make test

      - name: Create GitHub Release
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          VERSION="${{ steps.version.outputs.version }}"
          NOTES=$(git-cliff --latest --strip header 2>/dev/null || echo "Release v$VERSION")

          gh release create "v$VERSION" \
            --title "v$VERSION" \
            --notes "$NOTES" \
            todoc-linux-x86_64

      - name: Summary
        run: |
          VERSION="${{ steps.version.outputs.version }}"
          echo "## Release v$VERSION" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "- Binary: \`todoc-linux-x86_64\`" >> $GITHUB_STEP_SUMMARY
          echo "- [View Release](https://github.com/${{ github.repository }}/releases/tag/v$VERSION)" >> $GITHUB_STEP_SUMMARY
