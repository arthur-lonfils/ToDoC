name: Release

on:
  # Prepare release: auto-generate version bump + changelog on the release branch
  push:
    branches:
      - 'release/v*'

  # Publish release: tag + GitHub Release when release branch is merged to main
  pull_request:
    branches: [main]
    types: [closed]

permissions:
  contents: write

jobs:
  # ── Prepare: runs when you push to release/vX.Y.Z ───────────────
  # Bumps .version, updates src/cli.c, generates CHANGELOG.md, commits.
  prepare:
    runs-on: ubuntu-latest
    if: github.event_name == 'push'

    steps:
      - uses: actions/checkout@v5
        with:
          fetch-depth: 0
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Install dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y libsqlite3-dev

      - name: Install git-cliff
        run: |
          curl -sSfL https://github.com/orhun/git-cliff/releases/latest/download/git-cliff-x86_64-unknown-linux-gnu.tar.gz | tar xz
          sudo mv git-cliff /usr/local/bin/

      - name: Extract version from branch name
        id: version
        run: |
          BRANCH="${GITHUB_REF#refs/heads/}"
          VERSION=$(echo "$BRANCH" | sed 's|release/v||')
          if ! echo "$VERSION" | grep -qE '^[0-9]+\.[0-9]+\.[0-9]+$'; then
            echo "ERROR: Invalid version in branch name: '$VERSION'"
            exit 1
          fi
          echo "version=$VERSION" >> $GITHUB_OUTPUT
          echo "Version: $VERSION"

      - name: Check if already prepared
        id: check
        run: |
          CURRENT=$(cat .version | tr -d '[:space:]')
          if [ "$CURRENT" = "${{ steps.version.outputs.version }}" ]; then
            echo "skip=true" >> $GITHUB_OUTPUT
            echo "Already at v$CURRENT, skipping."
          else
            echo "skip=false" >> $GITHUB_OUTPUT
          fi

      - name: Update version and changelog
        if: steps.check.outputs.skip == 'false'
        run: |
          VERSION="${{ steps.version.outputs.version }}"

          printf "%s\n" "$VERSION" > .version
          sed -i "s/#define TODOC_VERSION \".*\"/#define TODOC_VERSION \"$VERSION\"/" src/cli.c
          git-cliff --tag "v$VERSION" --output CHANGELOG.md

      - name: Build and test
        if: steps.check.outputs.skip == 'false'
        run: |
          make
          make test

      - name: Commit version bump
        if: steps.check.outputs.skip == 'false'
        run: |
          VERSION="${{ steps.version.outputs.version }}"

          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"

          git add .version src/cli.c CHANGELOG.md
          git commit -m "chore: release v$VERSION"
          git push

  # ── Publish: runs when a release/* PR is merged to main ──────────
  # Creates the git tag and GitHub Release.
  publish:
    runs-on: ubuntu-latest
    if: |
      github.event_name == 'pull_request' &&
      github.event.pull_request.merged == true &&
      startsWith(github.event.pull_request.head.ref, 'release/v')

    steps:
      - uses: actions/checkout@v5
        with:
          fetch-depth: 0
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Install dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y libsqlite3-dev

      - name: Install git-cliff
        run: |
          curl -sSfL https://github.com/orhun/git-cliff/releases/latest/download/git-cliff-x86_64-unknown-linux-gnu.tar.gz | tar xz
          sudo mv git-cliff /usr/local/bin/

      - name: Extract version
        id: version
        run: |
          BRANCH="${{ github.event.pull_request.head.ref }}"
          VERSION=$(echo "$BRANCH" | sed 's|release/v||')
          echo "version=$VERSION" >> $GITHUB_OUTPUT

      - name: Build release binary
        run: |
          make clean
          make
          cp build/todoc todoc-linux-x86_64
          chmod +x todoc-linux-x86_64

      - name: Verify binary version
        run: |
          VERSION="${{ steps.version.outputs.version }}"
          BINARY_VERSION=$(./todoc-linux-x86_64 version 2>&1 | grep -oE '[0-9]+\.[0-9]+\.[0-9]+')
          if [ "$BINARY_VERSION" != "$VERSION" ]; then
            echo "ERROR: Binary reports v$BINARY_VERSION but expected v$VERSION"
            exit 1
          fi
          echo "Binary version matches: v$VERSION"

      - name: Create tag
        run: |
          VERSION="${{ steps.version.outputs.version }}"

          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"

          git tag -a "v$VERSION" -m "Release v$VERSION"
          git push origin "v$VERSION"

      - name: Create GitHub Release
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          VERSION="${{ steps.version.outputs.version }}"
          NOTES=$(git-cliff --latest --strip header 2>/dev/null || echo "Release v$VERSION")

          gh release create "v$VERSION" \
            --title "v$VERSION" \
            --notes "$NOTES" \
            todoc-linux-x86_64
